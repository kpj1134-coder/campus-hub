# ============================================
# LOCAL DEVELOPMENT (default profile)
# ============================================
server.port=8080
spring.data.mongodb.uri=mongodb://localhost:27017/campus_hub
jwt.secret=campus_hub_super_secret_key_2024_very_long_and_secure_string_for_jwt
jwt.expiration=86400000
ai.api.key=
cors.allowed.origins=http://localhost:5173
logging.level.com.campus.hub=DEBUG
spring.data.mongodb.auto-index-creation=true

# ============================================
# EMAIL CONFIGURATION (Gmail SMTP)
# Use Gmail App Password: https://myaccount.google.com/apppasswords
# ============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# Disable mail auto-config if credentials not provided
spring.mail.test-connection=false
